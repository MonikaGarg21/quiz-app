<body>
  <h1>JavaScript Quiz</h1>

    <div id="quiz-container">
        <h2 id="question">Which keyword is used to declare a variable in JavaScript?</h2>

        <div>
            <input type="radio" name="option" id="option1">
            <label for="option1" id="label1">var</label>
        </div>

        <div>
            <input type="radio" name="option" id="option2">
            <label for="option2" id="label2">int</label>
        </div>

        <div>
            <input type="radio" name="option" id="option3">
            <label for="option3" id="label3">string</label>
        </div>

        <div>
            <input type="radio" name="option" id="option4">
            <label for="option4" id="label4">float</label>
        </div>

        <br>
        <button id="nextBtn">Next</button>

        <h3 id="result"></h3>
    </div>
